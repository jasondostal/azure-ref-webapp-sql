# Azure Pipelines — Infrastructure as Code (Bicep), TWO-LAYER
#
# Separation of duties made physical (see docs/ARCHITECTURE.md):
#
#   INFRA LAYER  (infra.bicep)  → deployed on $(infraServiceConnection), a
#       SUBSCRIPTION-scoped connection the platform team owns. Creates the RG,
#       VNet + private DNS, and the self-hosted agent (+ its cross-RG ACR grant).
#
#   APP LAYER    (app.bicep)    → deployed on $(<env>ServiceConnection), the
#       RESOURCE-GROUP-scoped connection from `onboard-subscription.sh
#       --rbac-scope rg`. Creates App Service + SQL + private endpoints INSIDE
#       rg-refapp-<env>. This identity physically cannot touch another env.
#
#   SQL PROVISION (provision-sql-user.sh) → on the SELF-HOSTED pool (private SQL
#       is unreachable from hosted agents).
#
# Build-once-deploy-many: one run promotes dev → qa → stage → prod, each stage
# gated by ADO Environment approvals.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - pipelines/infra-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

variables:
  - group: vg-refapp-shared

stages:
  - ${{ each env in split('dev,qa,stage,prod', ',') }}:
    - stage: Deploy_${{ env }}
      displayName: 'Deploy → ${{ upper(env) }}'
      # dev matches no condition → empty dependsOn → runs first.
      dependsOn:
        - ${{ if eq(env, 'qa') }}:
          - Deploy_dev
        - ${{ if eq(env, 'stage') }}:
          - Deploy_qa
        - ${{ if eq(env, 'prod') }}:
          - Deploy_stage
      variables:
        - group: vg-refapp-${{ env }}
      jobs:
        # ── 1. INFRA LAYER — platform team, subscription-scoped, hosted ───────
        - deployment: Infra_${{ env }}
          displayName: 'Infra layer (RG + VNet + agent)'
          environment: 'refapp-${{ env }}'
          pool:
            vmImage: 'ubuntu-latest'
          strategy:
            runOnce:
              deploy:
                steps:
                  - checkout: self
                  - task: AzureCLI@2
                    displayName: 'az deployment sub create (infra.bicep)'
                    inputs:
                      azureSubscription: '$(infraServiceConnection)'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        az deployment sub create \
                          --location eastus \
                          --template-file infra/infra.bicep \
                          --parameters infra/params/${{ env }}.infra.bicepparam \
                          --parameters azpToken='$(azpToken)' \
                                       azpUrl='$(azpUrl)' \
                                       azpPool='$(azpPool)' \
                                       acrResourceId='$(acrResourceId)' \
                                       acrLoginServer='$(acrLoginServer)' \
                                       agentImage='$(agentImage)'

        # ── 2. APP LAYER — app team, RG-scoped, hosted ───────────────────────
        - deployment: App_${{ env }}
          displayName: 'App layer (App Service + SQL + PE)'
          dependsOn: Infra_${{ env }}
          environment: 'refapp-${{ env }}'
          pool:
            vmImage: 'ubuntu-latest'
          strategy:
            runOnce:
              deploy:
                steps:
                  - checkout: self
                  - task: AzureCLI@2
                    displayName: 'az deployment group create (app.bicep)'
                    inputs:
                      azureSubscription: '$(${{ env }}ServiceConnection)'   # RG-scoped
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        az deployment group create \
                          --resource-group rg-refapp-${{ env }} \
                          --template-file infra/app.bicep \
                          --parameters infra/params/${{ env }}.bicepparam \
                          --parameters tenantId='$(tenantId)' \
                                       sqlAdminLogin='$(sqlAdminLogin)' \
                                       sqlAdminPassword='$(sqlAdminPassword)' \
                                       sqlAdminGroupObjectId='$(sqlAdminGroupObjectId)' \
                                       sqlLocation='$(sqlLocation)' \
                                       sqlServerName='$(sqlServerName)'

        # ── 3. PROVISION SQL — self-hosted (private SQL) ─────────────────────
        - job: ProvisionSql_${{ env }}
          displayName: 'Provision SQL user (${{ env }})'
          dependsOn: App_${{ env }}
          pool:
            name: 'refapp-${{ env }}'        # self-hosted, VNet-injected
          steps:
            - checkout: self
            - task: AzureCLI@2
              displayName: 'Create app MI DB user'
              inputs:
                azureSubscription: '$(${{ env }}ServiceConnection)'
                scriptType: 'bash'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  chmod +x scripts/provision-sql-user.sh
                  scripts/provision-sql-user.sh \
                    "$(sqlServerName).database.windows.net" \
                    "refapp-db-${{ env }}" \
                    "refapp-app-${{ env }}" \
                    "rg-refapp-${{ env }}"
