# Azure Pipelines — Infrastructure as Code (Bicep)
#
# BUILD ONCE, DEPLOY MANY (single-branch model)
# ----------------------------------------------
# One branch: main. Triggers on infra/** only. One run validates (what-if
# against every env), then promotes the apply through dev → qa → stage → prod,
# gated by ADO Environment approvals.
#
# TWO-PLANE DEPLOY (the private-by-default wrinkle):
#   • The Bicep apply is pure ARM control-plane — it can run on a Microsoft-
#     HOSTED agent. This is also what bootstraps the self-hosted agent ACI on a
#     brand-new environment.
#   • Provisioning the app's managed-identity DB user requires a DATA-plane
#     connection to PRIVATE SQL — so it runs on the SELF-HOSTED, VNet-injected
#     pool. A hosted agent cannot reach the private endpoint.
#
# Secret parameters (tenantId, sqlAdminLogin, sqlAdminPassword, azpToken) come
# from ADO Variable Groups linked to Key Vault — never in source.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - pipelines/infra-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

variables:
  - group: vg-refapp-shared

stages:
  # ── WHAT-IF — surface the real diff for every env before any apply ──────────
  - stage: WhatIf
    displayName: 'What-If (all envs)'
    jobs:
      - job: WhatIfAll
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - ${{ each env in split('dev,qa,stage,prod', ',') }}:
            - task: AzureCLI@2
              displayName: 'What-If ${{ upper(env) }}'
              inputs:
                azureSubscription: '$(${{ env }}ServiceConnection)'
                scriptType: 'bash'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  az deployment sub what-if \
                    --location eastus \
                    --template-file infra/main.bicep \
                    --parameters infra/params/${{ env }}.bicepparam \
                    --parameters tenantId='$(tenantId)' \
                                 sqlAdminLogin='$(sqlAdminLogin)' \
                                 sqlAdminPassword='$(sqlAdminPassword)' \
                                 azpToken='$(azpToken)'

  # ── DEPLOY — one stage per env: ARM apply (hosted) → SQL provision (self) ───
  - ${{ each env in split('dev,qa,stage,prod', ',') }}:
    - stage: Deploy_${{ env }}
      displayName: 'Deploy Infra → ${{ upper(env) }}'
      dependsOn:
        - ${{ if eq(env, 'dev') }}:
          - WhatIf
        - ${{ if eq(env, 'qa') }}:
          - Deploy_dev
        - ${{ if eq(env, 'stage') }}:
          - Deploy_qa
        - ${{ if eq(env, 'prod') }}:
          - Deploy_stage
      variables:
        - group: vg-refapp-${{ env }}
      jobs:
        # ARM control-plane apply — bootstraps the agent on a fresh env.
        - deployment: DeployArm_${{ env }}
          displayName: 'Bicep apply (${{ env }})'
          environment: 'refapp-${{ env }}'   # approvals configured in ADO UI
          pool:
            vmImage: 'ubuntu-latest'
          strategy:
            runOnce:
              deploy:
                steps:
                  - checkout: self
                  - task: AzureCLI@2
                    displayName: 'az deployment sub create (${{ env }})'
                    inputs:
                      azureSubscription: '$(${{ env }}ServiceConnection)'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        az deployment sub create \
                          --location eastus \
                          --template-file infra/main.bicep \
                          --parameters infra/params/${{ env }}.bicepparam \
                          --parameters tenantId='$(tenantId)' \
                                       sqlAdminLogin='$(sqlAdminLogin)' \
                                       sqlAdminPassword='$(sqlAdminPassword)' \
                                       azpToken='$(azpToken)'

        # Data-plane: create the app MI's DB user against PRIVATE SQL.
        # Runs on the self-hosted pool — the only thing inside the VNet.
        - job: ProvisionSql_${{ env }}
          displayName: 'Provision SQL user (${{ env }})'
          dependsOn: DeployArm_${{ env }}
          pool:
            name: 'refapp-${{ env }}'        # self-hosted, VNet-injected
          steps:
            - checkout: self
            - task: AzureCLI@2
              displayName: 'Create app MI DB user'
              inputs:
                azureSubscription: '$(${{ env }}ServiceConnection)'
                scriptType: 'bash'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  chmod +x scripts/provision-sql-user.sh
                  scripts/provision-sql-user.sh \
                    "refapp-sql-${{ env }}.database.windows.net" \
                    "refapp-db-${{ env }}" \
                    "refapp-app-${{ env }}" \
                    "rg-refapp-${{ env }}"
